services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ontoprompt
      POSTGRES_USER: ontoprompt
      POSTGRES_PASSWORD: ontoprompt
    ports: ["5432:5432"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init-litellm-db.sql:/docker-entrypoint-initdb.d/02-litellm-db.sql

  redis:
    image: redis:7-alpine
    ports: ["6380:6379"]

  backend:
    build: ./backend
    ports: ["8000:8000"]
    env_file: .env
    depends_on: [db, redis]
    volumes: [./backend:/app, ./uploads:/uploads]
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery_worker:
    build: ./backend
    env_file: .env
    depends_on: [db, redis]
    volumes: [./backend:/app, ./uploads:/uploads]
    command: celery -A app.tasks.celery_app worker --loglevel=info

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    ports: ["4000:4000"]
    depends_on: [db]
    volumes: [./litellm_config.yaml:/app/config.yaml]
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    environment:
      # Use a dedicated DB — do NOT share .env DATABASE_URL with ontoprompt
      DATABASE_URL: postgresql://ontoprompt:ontoprompt@db:5432/litellm
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-}
      LITELLM_SALT_KEY: ${LITELLM_SALT_KEY:-}
      UI_USERNAME: ${UI_USERNAME:-admin}
      UI_PASSWORD: ${UI_PASSWORD:-}
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports: ["5173:5173"]
    environment:
      VITE_API_PROXY: http://backend:8000
    volumes: [./frontend:/app, /app/node_modules]
    command: npm run dev -- --host

volumes:
  postgres_data:
